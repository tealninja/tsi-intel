# Cloudflare Worker config for tsi-intel-api.
# Deploy:  wrangler deploy
# Secrets (NOT stored here — set once per environment):
#   wrangler secret put TSI_API_KEY        # required; Worker fails closed without it
#   wrangler secret put ANTHROPIC_API_KEY  # for the /api/ai proxy
name = "tsi-intel-api"
main = "worker.js"
compatibility_date = "2026-06-01"

# Existing pipeline/bugs/usage store (env.TSI_DATA)
[[kv_namespaces]]
binding = "TSI_DATA"
id = "e1b7efd464b647909e526903f52dc01f"   # namespace: tsi-pipeline-data

# CRM database (env.DB) — bound now; endpoints wired during the KV→D1 cutover.
[[d1_databases]]
binding = "DB"
database_name = "tsi-intel"
database_id = "e18ad8cb-ce35-42b2-ba01-8a1d31551398"
